<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Быстрые заметки</title>
  <link rel="stylesheet" href="selection.css" />
  <link rel="stylesheet" href="editor.css" />
</head>
<body>
  <div class="main-container">

    <!-- Header — компактный -->
    <header class="app-header compact">
      <!-- Логотип -->
      <a href="#" class="app-logo" onclick="return false;">
        <div class="app-logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <span class="app-logo-text">Заметки</span>
      </a>

      <!-- Правая часть: кнопки -->
      <div class="header-actions">
        <button id="themeToggleBtn" class="btn-icon btn-theme" title="Переключить тему">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
        <button id="debugBtn" class="btn-icon btn-debug" title="Все заметки">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>
    </header>

    <!-- Main Content — карточки в стиле Ozon -->
    <main class="content-area">

      <!-- Карточка: Выбор заметки -->
      <section class="ozon-card">
        <div class="card-header">
          <h2 class="card-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
            Выберите заметку
          </h2>
        </div>
        <div class="card-body">
          <!-- Custom Dropdown -->
          <div class="custom-dropdown" id="customDropdown">
            <button type="button" class="dropdown-trigger" id="dropdownTrigger" disabled>
              <span class="dropdown-selected-text">Загрузка списка...</span>
              <svg class="dropdown-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6 9l6 6 6-6"/>
              </svg>
            </button>
            <ul class="dropdown-menu" id="dropdownMenu">
              <!-- Options will be populated by JS -->
            </ul>
          </div>
          <!-- Hidden original select for accessibility (visually hidden but accessible) -->
          <select id="notesSelect" class="notes-select-lg">
            <option value="" disabled selected>Загрузка списка...</option>
          </select>
          <span id="noNotesMessage" class="info-message">Нет сохранённых заметок. Создайте новую!</span>
        </div>
      </section>

      <!-- Карточка: Создание заметки -->
      <section class="ozon-card">
        <div class="card-header">
          <h2 class="card-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Новая заметка
          </h2>
        </div>
        <div class="card-body">
          <div class="input-row">
            <input
              type="text"
              id="newNoteTitle"
              class="title-input-lg"
              placeholder="Введите заголовок..."
              maxlength="200"
            />
            <button id="createBtn" class="btn-create-lg" disabled>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Создать
            </button>
          </div>
        </div>
      </section>

    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <small>Закрытие вкладки без выбора отменит действие</small>
    </footer>

  </div>

  <!-- Модальное окно всех заметок -->
  <div id="debugModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header-row">
        <h3>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Все заметки
        </h3>
        <button id="closeModal" class="btn-icon btn-close" title="Закрыть">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="table-wrapper">
          <table class="debug-table">
            <thead>
              <tr>
                <th>Ключ</th>
                <th>Заголовок</th>
                <th>Контент</th>
                <th>Время</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="debugTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="selection.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Быстрые заметки — Редактор</title>
  <link rel="stylesheet" href="editor.css" />
</head>
<body>
  <div class="editor-container">
    
    <header class="editor-header">
      <div class="header-left">
        <input 
          type="text" 
          id="noteTitle" 
          class="note-title-input" 
          placeholder="Заголовок заметки..."
          maxlength="200"
        />
      </div>
      
      <div class="header-center">
        <select id="notesList" class="notes-select">
          <option value="" disabled selected>📋 Выбрать заметку...</option>
        </select>
      </div>
      
      <div class="header-right">
        <span class="status-indicator" id="saveStatus">Готово</span>
        <button id="debugBtn" class="btn-icon btn-debug" title="Показать все заметки (отладка)">🔍</button>
        <button id="deleteNote" class="btn-icon btn-delete" title="Удалить текущую заметку">🗑️</button>
      </div>
    </header>

    <div 
      id="editor" 
      class="editor-content" 
      contenteditable="true" 
      placeholder="Начните вводить заметку... (поддерживается вставка изображений и ссылок)"
      spellcheck="true"
    ></div>

    <footer class="editor-footer">
      <small>
        💡 Автосохранение при переключении вкладки | 
        ➕ Новая заметка: клик по иконке расширения | 
        🗑️ Удаление: кнопка корзины
      </small>
    </footer>
  </div>

  <div id="debugModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>📊 Все заметки в хранилище</h3>
        <button id="closeModal" class="btn-icon btn-close" title="Закрыть">✕</button>
      </div>
      <div class="modal-body">
        <div id="debugTableContainer" class="table-wrapper">
          <table id="debugTable" class="debug-table">
            <thead>
              <tr>
                <th>Ключ</th>
                <th>Заголовок</th>
                <th>Контент (превью)</th>
                <th>Время изменения</th>
              </tr>
            </thead>
            <tbody id="debugTableBody">
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="editor.js"></script>
</body>
</html>
